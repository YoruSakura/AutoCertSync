<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}自动证书同步{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% if request.session.get("authenticated") %}
    <nav class="navbar">
        <div class="nav-brand">自动证书同步</div>
        <div class="nav-links">
            <a href="/dashboard" class="{% if request.url.path == '/dashboard' %}active{% endif %}">仪表盘</a>
            <a href="/servers" class="{% if '/servers' in request.url.path %}active{% endif %}">服务器</a>
            <a href="/certs" class="{% if '/certs' in request.url.path %}active{% endif %}">证书</a>
            <a href="/logs" class="{% if '/logs' in request.url.path %}active{% endif %}">日志</a>
            <a href="/settings" class="{% if '/settings' in request.url.path %}active{% endif %}">设置</a>
            <a href="/logout">退出</a>
        </div>
    </nav>
    {% endif %}
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
